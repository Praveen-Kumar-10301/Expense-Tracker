<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Expense Tracker">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- App tile -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Ascending bars (spending tracked over time), kept inside the maskable safe zone -->
  <g fill="#ffffff">
    <rect x="106" y="282" width="60" height="90"  rx="16" opacity="0.70"/>
    <rect x="186" y="232" width="60" height="140" rx="16" opacity="0.82"/>
    <rect x="266" y="182" width="60" height="190" rx="16" opacity="0.92"/>
    <rect x="346" y="132" width="60" height="240" rx="16"/>
  </g>
  <!-- Coin accent on the tallest bar -->
  <circle cx="376" cy="132" r="34" fill="#ffffff"/>
  <circle cx="376" cy="132" r="34" fill="none" stroke="#1d4ed8" stroke-width="8" opacity="0.18"/>
</svg>
